name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd dashboard
          npm install

      - name: Build dashboard
        run: |
          cd dashboard
          npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
